name: angle-natives

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  LINUX_CONTAINER_IMAGE: registry.gitlab.steamos.cloud/steamrt/sniper/sdk

jobs:
  resolve:
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk
    outputs:
      ANGLE_COMMIT: ${{ steps.info.outputs.ANGLE_COMMIT }}
      VERSION: ${{ steps.info.outputs.VERSION }}
    steps:
      - name: Resolve ANGLE HEAD commit + version
        id: info
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(git ls-remote https://chromium.googlesource.com/angle/angle HEAD | awk '{print $1}')"
          SHORT="${SHA:0:12}"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            if [[ "${GITHUB_RUN_ATTEMPT:-1}" != "1" ]]; then
              VERSION="${VERSION}.r${GITHUB_RUN_ATTEMPT}"
            fi
          else
            VERSION="$(date -u +%Y%m%d).${SHORT}"
          fi

          echo "ANGLE_COMMIT=$SHA" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk
    strategy:
      fail-fast: false
      matrix:
        include:
          - classifier: natives-linux
            arch_dir: x86_64
            target_cpu: x64
            args_file: release-linux-x64.gn

          - classifier: natives-linux-arm64
            arch_dir: arm64
            target_cpu: arm64
            args_file: release-linux-arm64.gn
    env:
      ANGLE_COMMIT: ${{ needs.resolve.outputs.ANGLE_COMMIT }}
      CLASSIFIER: ${{ matrix.classifier }}
      TARGET_CPU: ${{ matrix.target_cpu }}
      ANGLE_DEBUG: ${{ github.event_name != 'release' }}
      DEPOT_TOOLS_PYTHON3: python3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install depot_tools
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Prepare ANGLE
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/depot_tools:$PATH"

          mkdir -p angle
          cd angle
          fetch angle

          if git apply --check ../patches/0001-linux-prefer-vulkan-default-display.patch; then
            git apply ../patches/0001-linux-prefer-vulkan-default-display.patch
          fi

          if [ "$TARGET_CPU" = "arm64" ]; then
            python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
          fi

          mkdir -p out/Release
          cp "../${{ matrix.args_file }}" out/Release/args.gn
          gn gen out/Release

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/depot_tools:$PATH"
          cd angle
          autoninja -C out/Release libEGL libGLESv2

      - name: Stage runtime libs into native/angle/...
        shell: bash
        run: |
          set -euo pipefail
          cd angle

          OUT="$GITHUB_WORKSPACE/dist/${CLASSIFIER}/native/angle/linux/${{ matrix.arch_dir }}"
          mkdir -p "$OUT"

          printf "ANGLE_COMMIT=%s\nRUNNER_OS=%s\nTARGET_CPU=%s\nANGLE_DEBUG=%s\n" \
            "$ANGLE_COMMIT" "$RUNNER_OS" "$TARGET_CPU" "$ANGLE_DEBUG" > "$OUT/ANGLE_BUILD_INFO.txt"

          cp -f LICENSE "$OUT/LICENSE.ANGLE" || true
          cp -f out/Release/libEGL.* "$OUT/"
          cp -f out/Release/libGLESv2.* "$OUT/"
          rm -Rf "$OUT/"*.TOC || true

      - name: Upload staged files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.classifier }}
          path: dist/${{ matrix.classifier }}
          if-no-files-found: error

  build-nonlinux:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: windows-latest
            classifier: natives-windows
            runtime_os_dir: windows
            arch_dir: x86_64
            target_cpu: x64
            args_file: release-windows-x64.gn

          - runs_on: macos-15-intel
            classifier: natives-macos
            runtime_os_dir: osx
            arch_dir: x86_64
            target_cpu: x64
            args_file: release-osx-x64.gn

          - runs_on: macos-latest
            classifier: natives-macos-arm64
            runtime_os_dir: osx
            arch_dir: arm64
            target_cpu: arm64
            args_file: release-osx-arm64.gn
    runs-on: ${{ matrix.runs_on }}
    env:
      ANGLE_COMMIT: ${{ needs.resolve.outputs.ANGLE_COMMIT }}
      CLASSIFIER: ${{ matrix.classifier }}
      TARGET_CPU: ${{ matrix.target_cpu }}
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      ANGLE_DEBUG: ${{ github.event_name != 'release' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install depot_tools
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$HOME/depot_tools"
          echo "$HOME/depot_tools" >> "$GITHUB_PATH"

      - name: Install depot_tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:USERPROFILE\depot_tools"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\depot_tools"

      - name: Prepare ANGLE
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/depot_tools:$PATH"
          mkdir -p angle
          cd angle
          fetch angle
          mkdir -p out/Release
          cp "../${{ matrix.args_file }}" out/Release/args.gn
          gn gen out/Release

      - name: Prepare ANGLE
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-PSDebug -Strict
          New-Item -ItemType Directory -Path angle
          Set-Location -Path angle
          fetch angle
          New-Item -ItemType Directory -Path out/Release
          Copy-Item -Path "../${{ matrix.args_file }}" -Destination "out/Release/args.gn"
          gn gen out/Release

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cd angle
          autoninja -C out/Release libEGL libGLESv2

      - name: Stage runtime libs into native/angle/...
        shell: bash
        run: |
          set -euo pipefail
          cd angle

          OUT="$GITHUB_WORKSPACE/dist/${CLASSIFIER}/native/angle/${{ matrix.runtime_os_dir }}/${{ matrix.arch_dir }}"
          mkdir -p "$OUT"

          printf "ANGLE_COMMIT=%s\nRUNNER_OS=%s\nTARGET_CPU=%s\nANGLE_DEBUG=%s\n" \
            "$ANGLE_COMMIT" "$RUNNER_OS" "$TARGET_CPU" "$ANGLE_DEBUG" > "$OUT/ANGLE_BUILD_INFO.txt"

          cp -f LICENSE "$OUT/LICENSE.ANGLE" || true
          cp -f out/Release/libEGL.* "$OUT/"
          cp -f out/Release/libGLESv2.* "$OUT/"
          cp -f out/Release/d3dcompiler* "$OUT/" || true
          cp -f out/Release/dxcompiler* "$OUT/" || true
          cp -f out/Release/dxil* "$OUT/" || true
          rm -Rf "$OUT/"*.TOC || true

      - name: Upload staged files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.classifier }}
          path: dist/${{ matrix.classifier }}
          if-no-files-found: error

  package:
    needs: [resolve, build-linux, build-nonlinux]
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk
    env:
      VERSION: ${{ needs.resolve.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          path: angle-artifacts

      - name: Create jars in dist/
        shell: bash
        env:
          PACKAGE_INPUT_DIR: angle-artifacts
          PACKAGE_OUTPUT_DIR: dist
        run: |
          set -euo pipefail
          chmod +x ./package.sh
          ./package.sh "$VERSION"

      - name: Upload packaged jars
        uses: actions/upload-artifact@v4
        with:
          name: angle-maven-jars
          path: dist/*.jar
          if-no-files-found: error

  publish:
    needs: [resolve, package]
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.resolve.outputs.VERSION }}
      MAVEN_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME || github.actor }}
      MAVEN_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Install Maven
        shell: bash
        run: |
          set -euo pipefail
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y maven
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y maven
          else
            echo "No supported package manager found to install Maven" >&2
            exit 1
          fi

      - name: Download Maven jars
        uses: actions/download-artifact@v4
        with:
          name: angle-maven-jars
          path: dist

      - name: Publish to GitHub Packages (Maven) - single deploy to avoid 409
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          GROUP_ID="io.github.${GITHUB_REPOSITORY_OWNER}"
          ARTIFACT_ID="angle-natives"
          REPO_URL="https://maven.pkg.github.com/${OWNER_LC}/${REPO_NAME}"

          if [[ -z "${MAVEN_TOKEN:-}" ]]; then
            echo "Missing Maven/GitHub Packages token. Configure GH_PACKAGES_TOKEN or use GITHUB_TOKEN." >&2
            exit 1
          fi

          MAIN="dist/${ARTIFACT_ID}-${VERSION}.jar"
          if [[ ! -f "$MAIN" ]]; then
            echo "Missing main jar: $MAIN" >&2
            exit 1
          fi

          POM="$(mktemp)"
          cat > "$POM" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>${GROUP_ID}</groupId>
            <artifactId>${ARTIFACT_ID}</artifactId>
            <version>${VERSION}</version>
            <packaging>jar</packaging>
          </project>
          EOF

          mapfile -t EXTRAS < <(ls -1 "dist/${ARTIFACT_ID}-${VERSION}-natives-"*.jar 2>/dev/null || true)

          if (( ${#EXTRAS[@]} == 0 )); then
            mvn -B deploy:deploy-file \
              -DrepositoryId=github \
              -Durl="$REPO_URL" \
              -DgroupId="$GROUP_ID" \
              -DartifactId="$ARTIFACT_ID" \
              -Dversion="$VERSION" \
              -Dpackaging=jar \
              -Dfile="$MAIN" \
              -DpomFile="$POM" \
              -DgeneratePom=false
            exit 0
          fi

          FILES=""
          CLASSIFIERS=""
          TYPES=""

          for f in "${EXTRAS[@]}"; do
            base="$(basename "$f")"
            cls="${base#${ARTIFACT_ID}-${VERSION}-}"
            cls="${cls%.jar}"

            FILES+="${f},"
            CLASSIFIERS+="${cls},"
            TYPES+="jar,"
          done

          FILES="${FILES%,}"
          CLASSIFIERS="${CLASSIFIERS%,}"
          TYPES="${TYPES%,}"

          mvn -B deploy:deploy-file \
            -DrepositoryId=github \
            -Durl="$REPO_URL" \
            -DgroupId="$GROUP_ID" \
            -DartifactId="$ARTIFACT_ID" \
            -Dversion="$VERSION" \
            -Dpackaging=jar \
            -Dfile="$MAIN" \
            -DpomFile="$POM" \
            -DgeneratePom=false \
            -Dfiles="$FILES" \
            -Dclassifiers="$CLASSIFIERS" \
            -Dtypes="$TYPES"
